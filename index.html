<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visualisasi Pengeluaran &amp; Anggaran</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="app-error-banner" role="alert" aria-live="assertive">
    <span id="app-error-message"></span>
  </div>

  <main class="app-layout">
    <header class="app-header">
      <h1>Visualisasi Pengeluaran &amp; Anggaran</h1>
    </header>

    <!-- Bagian Saldo & Anggaran -->
    <section class="balance-budget-section" aria-label="Saldo dan Anggaran">
      <div id="balance-section">
        <h2>Total Saldo</h2>
        <span id="display-balance">0.00</span>
      </div>

      <div class="budget-control">
        <label for="input-budget">Batas Anggaran</label>
        <input
          type="number"
          id="input-budget"
          name="input-budget"
          step="0.01"
          min="0.01"
          max="999999999.99"
          placeholder="Masukkan batas anggaran"
          aria-describedby="budget-error"
        >
        <div id="budget-error" role="alert" aria-live="polite"></div>
      </div>
    </section>

    <!-- Formulir Tambah Transaksi -->
    <section class="form-section" aria-label="Tambah Transaksi">
      <h2>Tambah Transaksi</h2>
      <form id="form-add" novalidate aria-describedby="form-error">
        <div class="form-group">
          <label for="input-name">Nama Item</label>
          <input
            type="text"
            id="input-name"
            name="input-name"
            maxlength="100"
            placeholder="Masukkan nama item"
            autocomplete="off"
            aria-required="true"
          >
        </div>

        <div class="form-group">
          <label for="input-amount">Jumlah</label>
          <input
            type="number"
            id="input-amount"
            name="input-amount"
            step="0.01"
            min="0.01"
            max="999999999.99"
            placeholder="0.00"
            aria-required="true"
          >
        </div>

        <div class="form-group">
          <label for="select-category">Kategori</label>
          <select id="select-category" name="select-category" aria-required="true">
            <option value="">Pilih kategori</option>
            <option value="Food">Makanan</option>
            <option value="Transport">Transportasi</option>
            <option value="Fun">Hiburan</option>
          </select>
        </div>

        <div id="form-error" role="alert" aria-live="polite"></div>

        <button type="submit" id="btn-add">Tambah Transaksi</button>
      </form>
    </section>

    <!-- Bagian Daftar Transaksi -->
    <section class="list-section" aria-label="Daftar Transaksi">
      <div class="list-header">
        <h2>Transaksi</h2>
        <div class="sort-control">
          <label for="select-sort">Urutkan berdasarkan</label>
          <select id="select-sort" name="select-sort">
            <option value="insertion">Tanggal ditambahkan</option>
            <option value="amount-asc">Jumlah: Terendah ke Tertinggi</option>
            <option value="amount-desc">Jumlah: Tertinggi ke Terendah</option>
            <option value="category-asc">Kategori: A–Z</option>
          </select>
        </div>
      </div>

      <ul id="transaction-list" aria-label="Daftar transaksi" aria-live="polite">
        <!-- Transaksi ditampilkan oleh JS -->
      </ul>
    </section>

    <!-- Bagian Grafik -->
    <section class="chart-section" aria-label="Pengeluaran per Kategori">
      <h2>Pengeluaran per Kategori</h2>
      <canvas id="chart-canvas" role="img" aria-label="Grafik lingkaran pengeluaran per kategori"></canvas>
      <div id="chart-fallback" aria-live="polite">
        <!-- Ditampilkan jika Chart.js CDN gagal dimuat -->
      </div>
    </section>

    <!-- Bagian Ringkasan Bulanan -->
    <section id="monthly-summary" aria-label="Ringkasan Bulanan">
      <h2>Ringkasan Bulanan</h2>
      <div class="monthly-controls">
        <label for="select-month">Bulan</label>
        <select id="select-month" name="select-month">
          <!-- Opsi diisi oleh JS -->
        </select>
      </div>
      <ul id="monthly-list" aria-label="Daftar transaksi bulanan" aria-live="polite">
        <!-- Transaksi yang difilter ditampilkan oleh JS -->
      </ul>
      <p class="monthly-total-label">
        Total Bulanan: <strong id="monthly-total">0.00</strong>
      </p>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/app.js" defer></script>
</body>
</html>
